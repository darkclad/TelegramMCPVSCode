# TelegramMCP example configuration.
# Copy to `config.toml` (which is gitignored) and edit.

[bot]
# Prefer the env var. The bot token is never logged.
token_env = "TELEGRAM_BOT_TOKEN"
# token = "123456:ABC..."          # inline alternative; warning logged
# api_base_url = "https://api.telegram.org"   # override for tests

[storage]
# SQLite history database. Path can be relative (resolved against CWD) or absolute.
# Parent directory must exist before launching the server.
path = "./history.db"

[updater]
enabled = true
poll_timeout_secs = 30
allowed_update_kinds = [
  "message", "edited_message",
  "channel_post", "edited_channel_post",
]

# [retention]
# Background pruning runs every 6 hours. Omit a key to disable that limit.
# max_age_days = 365            # drop messages older than this
# max_messages_per_chat = 50000 # keep only the newest N messages per chat

[aliases]
me = 12345678
alerts = -1001234567890
"team-eng" = -1009876543210

[access]
# Inbound: drop updates from chats not in this list. Empty = open.
allowed_chats = ["me", "alerts", "team-eng"]
# Outbound: refuse tg_send_* targeting chats not in this list. Empty = unrestricted.
allowed_send_targets = []
# Confine the file tools (download, send_photo, send_document) to one
# directory: when set, those tools accept only relative paths resolved
# against it. Unset = unrestricted (paths containing `..` are always
# rejected regardless).
# file_root = "./files"
